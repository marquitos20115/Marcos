<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Organizador Personal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">
    <main class="login-wrapper">
        <section class="login-card">
            <span class="hero-tag login-tag">Crear cuenta</span>
            <h1>Registrarse</h1>
            <p class="login-text">Creá tu usuario para tener tus tareas personales separadas.</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            {% if success %}
            <div class="login-success">{{ success }}</div>
            {% endif %}

            <form method="POST" class="task-form">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Elegí un usuario" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Creá una contraseña" required>

                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" name="confirmar" placeholder="Repetí la contraseña" required>

                <button type="submit" class="btn btn-primary">Crear cuenta</button>
            </form>

            <p class="login-link-text">
                ¿Ya tenés cuenta?
                <a href="{{ url_for('login') }}">Iniciá sesión</a>
            </p>
        </section>
    </main>
</body>

</html>
